<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Bazaar Islamic Store</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="cssstyle.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <!-- Same header -->
    </header>

    <!-- Checkout Section -->
    <section class="checkout-page">
        <div class="container">
            <h2 class="section-title">Checkout</h2>
            
            <div class="checkout-layout">
                <!-- Checkout Form -->
                <div class="checkout-form">
                    <form id="checkout-form">
                        <div class="form-group">
                            <label for="fullname">Full Name *</label>
                            <input type="text" id="fullname" name="fullname" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="address">Delivery Address</label>
                            <textarea id="address" name="address" rows="3"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label>Delivery Method *</label>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="delivery" value="pickup" checked> Branch Pickup
                                </label>
                                <label>
                                    <input type="radio" name="delivery" value="home"> Home Delivery
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-group" id="branch-select-group">
                            <label for="branch">Select Branch *</label>
                            <select id="branch" name="branch" required>
                                <option value="">Choose a branch</option>
                                <option value="Mbale">Mbale City (Headquarters)</option>
                                <option value="Kampala">Kampala</option>
                                <option value="Jinja">Jinja</option>
                                <option value="Mbarara">Mbarara</option>
                                <option value="Gulu">Gulu</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Payment Method *</label>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="payment" value="mtn" checked> MTN MoMo
                                </label>
                                <label>
                                    <input type="radio" name="payment" value="airtel"> Airtel Money
                                </label>
                                <label>
                                    <input type="radio" name="payment" value="cod"> Cash on Delivery
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                    </form>
                </div>
                
                <!-- Order Summary -->
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div id="order-items">
                        <!-- Cart items will be listed here -->
                    </div>
                    <div class="summary-totals">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="summary-subtotal">0 UGX</span>
                        </div>
                        <div class="summary-row">
                            <span>Delivery Fee:</span>
                            <span id="delivery-fee">0 UGX</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="summary-total">0 UGX</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Order Success Modal -->
    <div id="success-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body">
                <i class="fas fa-check-circle success-icon"></i>
                <h3>Order Placed Successfully!</h3>
                <p>Thank you for shopping with Bazaar. Your order has been received.</p>
                <p>A confirmation email has been sent to your email address.</p>
                <p>Order ID: <span id="order-id"></span></p>
                <a href="products.html" class="btn btn-primary">Continue Shopping</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <!-- Same footer -->
    </footer>

    <!-- JavaScript -->
    <script src="jsapi.js"></script>
    <script src="jscart.js"></script>
    <script src="jsapp.js"></script>
</body>
</html>
