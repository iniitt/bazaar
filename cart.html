<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Bazaar Islamic Store</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="cssstyle.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <!-- Same header as products.html -->
    </header>

    <!-- Cart Section -->
    <section class="cart-page">
        <div class="container">
            <h2 class="section-title">Your Shopping Cart</h2>
            
            <div id="cart-container">
                <!-- Cart items will be loaded here -->
                <div class="loading-spinner">Loading cart...</div>
            </div>
            
            <div class="cart-actions">
                <button id="clear-cart" class="btn btn-secondary">Clear Cart</button>
                <a href="products.html" class="btn btn-primary">Continue Shopping</a>
                <a href="checkout.html" id="checkout-btn" class="btn btn-primary">Proceed to Checkout</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <!-- Same footer -->
    </footer>

    <!-- JavaScript -->
    <script src="jsapi.js"></script>
    <script src="jscart.js"></script>
    <script src="jsapp.js"></script>
</body>
</html>
